<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>datalotl - Consulting, Education, and Entertainment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .logo {
            width: 90px;
            height: auto;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            color: #1a1a2e;
        }

        .tagline {
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 3rem;
            text-align: center;
        }

        .contact-section {
            width: 100%;
            background: #fff;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .contact-section h2 {
            font-size: 1.25rem;
            color: #1a1a2e;
            margin-bottom: 1rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 0.35rem;
        }

        input, textarea {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            background: #fafafa;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #5b6abf;
            background: #fff;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: #5b6abf;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #4a58a8;
        }

        footer {
            padding: 1.5rem;
            text-align: center;
            font-size: 0.8rem;
            color: #999;
        }

        .lang-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            padding: 0.4rem 0.75rem;
            background: #5b6abf;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            width: auto;
            z-index: 100;
        }

        .lang-toggle:hover {
            background: #4a58a8;
        }
    </style>
</head>
<body>
    <button class="lang-toggle" id="lang-toggle" onclick="toggleLang()">ES</button>
    <main>
        <div class="brand">
            <h1>datalotl</h1>
            <img src="artwork/datalotl_trans.png" alt="Datalotl LLC Logo" class="logo">
        </div>
        <p class="tagline">Consulting, Education, and Entertainment</p>

        <div class="contact-section">
            <h2>Get in Touch</h2>
            <form id="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="interest">Interested In</label>
                    <select id="interest" name="interest" style="width:100%;padding:0.6rem 0.75rem;border:1px solid #ddd;border-radius:6px;font-size:1rem;font-family:inherit;background:#fafafa;">
                        <option value="Consulting">Consulting</option>
                        <option value="Education">Education</option>
                        <option value="General Inquiry">General Inquiry</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required></textarea>
                </div>
                <button type="submit">Send Message</button>
            </form>
        </div>
    </main>

    <footer>
        &copy; 2025-2026 Datalotl LLC. All rights reserved.
    </footer>

    <script>
        var currentLang = 'en';

        var translations = {
            en: {
                title: 'datalotl - Consulting, Education, and Entertainment',
                tagline: 'Consulting, Education, and Entertainment',
                getInTouch: 'Get in Touch',
                name: 'Name',
                email: 'Email',
                interestedIn: 'Interested In',
                message: 'Message',
                send: 'Send Message',
                consulting: 'Consulting',
                education: 'Education',
                generalInquiry: 'General Inquiry',
                footer: '\u00a9 2025-2026 Datalotl LLC. All rights reserved.',
                inquiry: 'Inquiry from'
            },
            es: {
                title: 'datalotl - Consultor\u00eda, Educaci\u00f3n y Entretenimiento',
                tagline: 'Consultor\u00eda, Educaci\u00f3n y Entretenimiento',
                getInTouch: 'Cont\u00e1ctenos',
                name: 'Nombre',
                email: 'Correo electr\u00f3nico',
                interestedIn: 'Interesado en',
                message: 'Mensaje',
                send: 'Enviar mensaje',
                consulting: 'Consultor\u00eda',
                education: 'Educaci\u00f3n',
                generalInquiry: 'Consulta general',
                footer: '\u00a9 2025-2026 Datalotl LLC. Todos los derechos reservados.',
                inquiry: 'Consulta de'
            }
        };

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'es' : 'en';
            var t = translations[currentLang];

            document.documentElement.lang = currentLang;
            document.title = t.title;
            document.querySelector('.tagline').textContent = t.tagline;
            document.querySelector('.contact-section h2').textContent = t.getInTouch;
            document.querySelector('label[for="name"]').textContent = t.name;
            document.querySelector('label[for="email"]').textContent = t.email;
            document.querySelector('label[for="interest"]').textContent = t.interestedIn;
            document.querySelector('label[for="message"]').textContent = t.message;
            document.querySelector('#contact-form button').textContent = t.send;
            document.querySelector('footer').innerHTML = t.footer;

            var options = document.getElementById('interest').options;
            options[0].textContent = t.consulting;
            options[1].textContent = t.education;
            options[2].textContent = t.generalInquiry;

            document.getElementById('lang-toggle').textContent = currentLang === 'en' ? 'ES' : 'EN';
        }

        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            var t = translations[currentLang];
            var name = document.getElementById('name').value;
            var email = document.getElementById('email').value;
            var interest = document.getElementById('interest').value;
            var message = document.getElementById('message').value;

            var subject = encodeURIComponent(interest + ' ' + t.inquiry + ' ' + name);
            var body = encodeURIComponent(
                t.name + ': ' + name + '\n' +
                t.email + ': ' + email + '\n' +
                t.interestedIn + ': ' + interest + '\n\n' +
                message
            );

            window.location.href = 'mailto:info@datalotl.com?subject=' + subject + '&body=' + body;
        });
    </script>
</body>
</html>
